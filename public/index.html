<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 결정 도우미</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 1L11.2 6.8L17 9L11.2 11.2L9 17L6.8 11.2L1 9L6.8 6.8L9 1Z" fill="#C9A84C" />
            </svg>
          </div>
          <span class="logo-text">AI 결정 도우미</span>
        </div>
        <p class="header-sub">지금 상태를 알려주시면 AI가 최적의 행동을 분석해드려요</p>
      </div>
    </header>

    <main class="main">

      <!-- AI 분석 배너 -->
      <div class="ai-banner">
        <div class="ai-banner-dot"></div>
        <span id="aiBannerText">분석 준비 중...</span>
      </div>

      <!-- Input Card -->
      <div class="card input-card">
        <div class="card-header">
          <h2 class="card-title">지금 상태를 알려주세요</h2>
          <span class="card-badge">10개 항목</span>
        </div>
        <p class="card-desc">더 많은 정보를 입력할수록 AI 추천이 정확해져요</p>

        <form id="inputForm">

          <!-- 섹션: 신체 상태 -->
          <div class="field-section">
            <div class="section-title">
              <span class="section-icon">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <circle cx="7" cy="7" r="6" stroke="#C9A84C" stroke-width="1.5" />
                  <path d="M7 4v3l2 1.5" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" />
                </svg>
              </span>
              신체 · 컨디션
            </div>
            <div class="field-grid">

              <!-- 피로도 -->
              <div class="field-group">
                <label class="field-label">피로도</label>
                <div class="select-wrapper">
                  <select name="fatigue">
                    <option value="" disabled selected>선택</option>
                    <option value="very_low">매우 낮음 — 완전 충전 상태</option>
                    <option value="low">낮음 — 가볍고 상쾌함</option>
                    <option value="medium">보통 — 무난한 상태</option>
                    <option value="high">높음 — 좀 지침</option>
                    <option value="very_high">매우 높음 — 완전 방전</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

              <!-- 수면 상태 -->
              <div class="field-group">
                <label class="field-label">수면 상태</label>
                <div class="select-wrapper">
                  <select name="sleep">
                    <option value="" disabled selected>선택</option>
                    <option value="great">숙면 — 8시간 이상</option>
                    <option value="good">양호 — 6~8시간</option>
                    <option value="poor">부족 — 4~6시간</option>
                    <option value="very_poor">매우 부족 — 4시간 미만</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

              <!-- 공복 상태 -->
              <div class="field-group">
                <label class="field-label">식사 여부</label>
                <div class="select-wrapper">
                  <select name="hunger">
                    <option value="" disabled selected>선택</option>
                    <option value="full">배부름 — 방금 먹음</option>
                    <option value="normal">보통 — 적당히 먹음</option>
                    <option value="hungry">배고픔 — 식사 필요</option>
                    <option value="very_hungry">매우 배고픔 — 오래 굶음</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

            </div>
          </div>

          <!-- 섹션: 감정 상태 -->
          <div class="field-section">
            <div class="section-title">
              <span class="section-icon">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <circle cx="7" cy="7" r="6" stroke="#C9A84C" stroke-width="1.5" />
                  <path d="M4.5 8.5c.7.8 1.5 1.2 2.5 1.2s1.8-.4 2.5-1.2" stroke="#C9A84C" stroke-width="1.5"
                    stroke-linecap="round" />
                  <circle cx="5" cy="5.5" r="0.8" fill="#C9A84C" />
                  <circle cx="9" cy="5.5" r="0.8" fill="#C9A84C" />
                </svg>
              </span>
              감정 · 심리
            </div>
            <div class="field-grid">

              <!-- 기분 -->
              <div class="field-group">
                <label class="field-label">기분</label>
                <div class="select-wrapper">
                  <select name="mood">
                    <option value="" disabled selected>선택</option>
                    <option value="very_energetic">매우 활기참 — 뭐든 하고 싶음</option>
                    <option value="energetic">활기참 — 의욕 있음</option>
                    <option value="normal">보통 — 무난함</option>
                    <option value="lazy">게으름 — 움직이기 싫음</option>
                    <option value="depressed">우울 — 기분이 가라앉음</option>
                    <option value="anxious">불안 — 마음이 불편함</option>
                    <option value="bored">지루함 — 자극이 필요함</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

              <!-- 스트레스 -->
              <div class="field-group">
                <label class="field-label">스트레스</label>
                <div class="select-wrapper">
                  <select name="stress">
                    <option value="" disabled selected>선택</option>
                    <option value="none">없음 — 평온함</option>
                    <option value="low">낮음 — 약간 신경 쓰임</option>
                    <option value="medium">보통 — 신경 쓰이는 일 있음</option>
                    <option value="high">높음 — 많이 쌓임</option>
                    <option value="very_high">매우 높음 — 한계에 가까움</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

            </div>
          </div>

          <!-- 섹션: 환경 -->
          <div class="field-section">
            <div class="section-title">
              <span class="section-icon">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path
                    d="M7 1.5L7 3M7 11v1.5M1.5 7H3M11 7h1.5M3.4 3.4l1.1 1.1M9.5 9.5l1.1 1.1M3.4 10.6l1.1-1.1M9.5 4.5l1.1-1.1"
                    stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round" />
                  <circle cx="7" cy="7" r="2.5" stroke="#C9A84C" stroke-width="1.5" />
                </svg>
              </span>
              환경 · 상황
            </div>
            <div class="field-grid">

              <!-- 날씨 -->
              <div class="field-group">
                <label class="field-label">날씨</label>
                <div class="select-wrapper">
                  <select name="weather">
                    <option value="" disabled selected>선택</option>
                    <option value="sunny_hot">맑고 더움 — 30도 이상</option>
                    <option value="sunny">맑음 — 쾌청한 날씨</option>
                    <option value="cloudy">흐림 — 구름 많음</option>
                    <option value="rainy_light">가랑비 — 약한 비</option>
                    <option value="rainy">비 — 우산 필요</option>
                    <option value="rainy_heavy">폭우 — 외출 어려움</option>
                    <option value="snowy">눈 — 설경</option>
                    <option value="windy">바람 — 강풍</option>
                    <option value="cold">추움 — 10도 이하</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

              <!-- 여유 시간 -->
              <div class="field-group">
                <label class="field-label">지금 여유 시간</label>
                <div class="select-wrapper">
                  <select name="time">
                    <option value="" disabled selected>선택</option>
                    <option value="very_short">30분도 없어</option>
                    <option value="short">30분~1시간 정도</option>
                    <option value="medium">1~2시간 있어</option>
                    <option value="long">2~4시간 있어</option>
                    <option value="very_long">오늘 하루 다 비었어</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

              <!-- 예산 -->
              <div class="field-group">
                <label class="field-label">예산</label>
                <div class="select-wrapper">
                  <select name="budget">
                    <option value="" disabled selected>선택</option>
                    <option value="none">없음 — 무료만 가능</option>
                    <option value="very_low">1만원 이하</option>
                    <option value="low">1~3만원</option>
                    <option value="medium">3~7만원</option>
                    <option value="high">7~15만원</option>
                    <option value="very_high">15만원 이상 — 넉넉함</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

              <!-- 동행 여부 -->
              <div class="field-group">
                <label class="field-label">동행</label>
                <div class="select-wrapper">
                  <select name="companion">
                    <option value="" disabled selected>선택</option>
                    <option value="alone">혼자</option>
                    <option value="partner">연인과 함께</option>
                    <option value="friends">친구들과 함께</option>
                    <option value="family">가족과 함께</option>
                    <option value="colleague">동료와 함께</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

            </div>
          </div>

          <!-- 섹션: 목적 -->
          <div class="field-section">
            <div class="section-title">
              <span class="section-icon">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M7 2L8.5 5.5L12 6.2L9.5 8.7L10.1 12.2L7 10.5L3.9 12.2L4.5 8.7L2 6.2L5.5 5.5L7 2Z"
                    stroke="#C9A84C" stroke-width="1.5" stroke-linejoin="round" />
                </svg>
              </span>
              목적 · 원하는 것
            </div>
            <div class="field-grid">

              <!-- 원하는 활동 유형 -->
              <div class="field-group">
                <label class="field-label">원하는 활동</label>
                <div class="select-wrapper">
                  <select name="activity_type">
                    <option value="" disabled selected>선택</option>
                    <option value="rest">휴식 — 아무것도 안 하고 싶음</option>
                    <option value="social">사교 — 사람들과 어울리고 싶음</option>
                    <option value="creative">창작 — 뭔가 만들고 싶음</option>
                    <option value="physical">운동 — 몸을 움직이고 싶음</option>
                    <option value="learning">학습 — 새로운 걸 배우고 싶음</option>
                    <option value="entertainment">오락 — 즐기고 싶음</option>
                    <option value="food">식도락 — 맛있는 거 먹고 싶음</option>
                    <option value="nature">자연 — 바깥 공기 마시고 싶음</option>
                    <option value="shopping">쇼핑 — 뭔가 사고 싶음</option>
                    <option value="undecided">모르겠음 — AI가 정해줘</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

              <!-- 장소 선호 -->
              <div class="field-group">
                <label class="field-label">장소 선호</label>
                <div class="select-wrapper">
                  <select name="location_pref">
                    <option value="" disabled selected>선택</option>
                    <option value="home">집 안 — 나가기 싫음</option>
                    <option value="nearby">근처 — 10분 이내</option>
                    <option value="local">동네 — 30분 이내</option>
                    <option value="city">시내 — 어디든 OK</option>
                    <option value="outdoor">야외 — 자연 속</option>
                    <option value="anywhere">상관없음</option>
                  </select>
                  <span class="select-caret">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                      <path d="M2 4l4 4 4-4" stroke="#5A5A5A" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                    </svg>
                  </span>
                </div>
              </div>

            </div>
          </div>

          <!-- 자유 입력 -->
          <div class="field-section">
            <div class="section-title">
              <span class="section-icon">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path
                    d="M2 10.5V12h1.5l6-6L8 4.5l-6 6zM11.7 3.3a1 1 0 000-1.4l-.6-.6a1 1 0 00-1.4 0l-1 1L10.7 4.3l1-1z"
                    fill="#C9A84C" />
                </svg>
              </span>
              추가로 하고 싶은 말 <span class="optional-tag">선택</span>
            </div>
            <div class="textarea-wrapper">
              <textarea name="extra_note" id="extraNote"
                placeholder="예: 요즘 번아웃이 와서 완전히 쉬고 싶어요. 사람 많은 곳은 피하고 싶고, 조용한 곳이 좋아요." rows="3"
                maxlength="200"></textarea>
              <span class="char-count"><span id="charCount">0</span>/200</span>
            </div>
          </div>

          <button type="submit" id="submitBtn" class="btn-primary">
            <span class="btn-text">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M8 1L10.2 6.2L16 7L11.5 11.4L12.7 17L8 14.5L3.3 17L4.5 11.4L0 7L5.8 6.2L8 1Z"
                  fill="currentColor" />
              </svg>
              AI 분석 시작
            </span>
            <span class="btn-loading" hidden>
              <span class="spinner"></span>
              분석 중...
            </span>
          </button>

        </form>
      </div>

      <!-- Result Card -->
      <div class="card result-card" id="resultCard" hidden>
        <div class="result-header">
          <div class="result-engine-tag">
            <span class="engine-dot"></span>
            AI 분석 완료
          </div>
        </div>

        <div class="result-section">
          <span class="result-badge">최적 추천</span>
          <div class="recommendation-block">
            <p class="recommendation-text" id="recommendationText"></p>
          </div>
        </div>

        <!-- 관련 이미지 -->
        <div class="result-section" id="imageSection">
          <span class="section-label">관련 이미지</span>
          <div class="image-grid" id="imageGrid"></div>
        </div>

        <div class="result-section">
          <span class="section-label">분석 이유</span>
          <p class="reason-text" id="reasonText"></p>
        </div>

        <!-- 유튜브 링크 -->
        <div class="result-section">
          <span class="section-label">관련 유튜브</span>
          <a class="youtube-link" id="youtubeLink" href="#" target="_blank" rel="noopener">
            <span class="yt-icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <rect width="18" height="18" rx="4" fill="#FF0000" />
                <path d="M7 5.5l5.5 3.5L7 12.5V5.5Z" fill="white" />
              </svg>
            </span>
            <span class="yt-text" id="youtubeLinkText"></span>
            <span class="yt-arrow">→</span>
          </a>
        </div>

        <div class="divider"></div>

        <div class="result-section">
          <span class="section-label">다른 선택지</span>
          <div class="alternatives-list" id="alternativesList"></div>
        </div>

        <div class="divider"></div>

        <!-- 주변 장소 지도 -->
        <div class="result-section" id="mapSection">
          <div class="map-header">
            <span class="section-label">주변 추천 장소</span>
            <span class="map-status" id="mapStatus">위치 확인 중...</span>
          </div>
          <div id="map" class="map-container"></div>
          <div class="place-list" id="placeList"></div>
        </div>
      </div>

      <!-- Error Card -->
      <div class="card error-card" id="errorCard" hidden>
        <div class="error-content">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="#E05C5C" stroke-width="1.5" />
            <path d="M8 5v3.5M8 11v.5" stroke="#E05C5C" stroke-width="1.5" stroke-linecap="round" />
          </svg>
          <p class="error-text" id="errorText"></p>
        </div>
      </div>

    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>

</html>
